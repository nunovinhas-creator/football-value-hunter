name: Quantitative Football Bot Automation

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  execute-algorithm:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout do Código Fonte
        uses: actions/checkout@v4

      - name: 2. Setup do Ambiente Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 3. Instalar Dependências e Compilar Módulos Cython
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 4. Executar Pipeline de Value Hunting
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BSD_API_KEY: ${{ secrets.BSD_API_KEY }}
        run: python main.py

      - name: 5. Publicar Resultados no Dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/results.json
          git diff --staged --quiet || git commit -m "chore: dashboard atualizado $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push origin HEAD
